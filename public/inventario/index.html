<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/inventario/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mister Inventario — Control de inventario y punto de venta para negocios chilenos.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mister Inventario">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mister Inventario</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background: #000; }
  </style>
</head>
<body>
  <!-- Splash screen: visible inmediatamente mientras Flutter carga -->
  <div id="mi-splash">
    <style>
      #mi-splash {
        position: fixed; inset: 0;
        background: #000000;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #mi-splash.fade-out { opacity: 0; pointer-events: none; }
      #mi-splash img { width: 96px; height: 96px; border-radius: 22px; }
      #mi-splash .mi-nombre {
        margin-top: 16px;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 20px; font-weight: 700; letter-spacing: 0.3px;
      }
      #mi-splash .mi-nombre span { color: #FFD700; }
      #mi-splash .mi-ring {
        margin-top: 32px;
        width: 28px; height: 28px;
        border: 3px solid rgba(255,215,0,0.2);
        border-top-color: #FFD700;
        border-radius: 50%;
        animation: mi-spin 0.8s linear infinite;
      }
      @keyframes mi-spin { to { transform: rotate(360deg); } }
    </style>
    <img src="favicon.png" alt="Mister Inventario">
    <div class="mi-nombre">Mister <span>Inventario</span></div>
    <div class="mi-ring"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('mi-splash');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(function () { splash.remove(); }, 380);
      }
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- ZXing: librería para escaneo de códigos de barras desde la cámara web -->
  <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
  <script>
    var _zxingReader = null;

    function MisterScannerStart(videoElementId, dartCallback) {
      if (typeof ZXing === 'undefined') {
        setTimeout(function() { MisterScannerStart(videoElementId, dartCallback); }, 200);
        return;
      }
      var codeReader = new ZXing.BrowserMultiFormatReader();
      _zxingReader = codeReader;
      codeReader.decodeFromVideoDevice(null, videoElementId, function(result, err) {
        if (result) {
          dartCallback(result.getText());
        }
      });
    }

    function MisterScannerStop() {
      if (_zxingReader) {
        _zxingReader.reset();
        _zxingReader = null;
      }
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
