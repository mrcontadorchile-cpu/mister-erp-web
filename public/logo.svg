<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" fill="none" style="background:white">

  <!-- ── BUILDINGS (black silhouettes) ── -->

  <!-- Far left building -->
  <rect x="2" y="42" width="10" height="27" rx="1" fill="#111"/>

  <!-- Left building -->
  <rect x="14" y="34" width="13" height="35" rx="1" fill="#111"/>
  <rect x="19.5" y="29" width="2" height="6" fill="#111"/>

  <!-- Center building (tallest) -->
  <rect x="29" y="16" width="16" height="53" rx="1" fill="#111"/>
  <rect x="36" y="9" width="2.5" height="8" fill="#111"/>
  <rect x="33" y="13" width="8" height="2" fill="#111"/>

  <!-- Right building -->
  <rect x="47" y="26" width="14" height="43" rx="1" fill="#111"/>
  <rect x="53" y="20" width="2" height="7" fill="#111"/>

  <!-- Far right building -->
  <rect x="63" y="38" width="10" height="31" rx="1" fill="#111"/>

  <!-- Ground line -->
  <rect x="2" y="68" width="71" height="2" rx="1" fill="#111"/>

  <!-- ── GOLDEN ORBIT ── -->
  <ellipse cx="37" cy="45" rx="38" ry="14"
    stroke="#d4a017" stroke-width="3.5" fill="none"
    transform="rotate(-12 37 45)"/>

  <!-- Swoosh tail bottom-right -->
  <path d="M 62 57 C 72 64 76 62 70 56"
    stroke="#d4a017" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- Swoosh head top-left -->
  <path d="M 8 31 C 2 26 2 22 8 25"
    stroke="#d4a017" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ── TEXT ── -->
  <text x="86" y="52"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="38"
    fill="#111"
    letter-spacing="2">ERP</text>

  <text x="88" y="68"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="12.5"
    fill="#111"
    letter-spacing="4">MISTER GROUP</text>

</svg>
